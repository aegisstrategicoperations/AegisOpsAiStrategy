<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Ops & AI Strategy | Wharton, TX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0D1B2A;
            --dark-blue: #1B263B;
            --cyan: #00E5FF;
            --gold: #B89E6B;
            --white: #FFFFFF;
            --slate: #778899;
        }

        body {
            background-color: var(--navy);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Hero Section */
        header {
            text-align: center;
            padding: 100px 20px;
            background: radial-gradient(circle at center, #1B263B 0%, #0D1B2A 100%);
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
        }

        .hero-logo {
            width: 200px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(0, 229, 255, 0.3));
            margin-bottom: 25px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0;
            text-transform: uppercase;
        }

        .tagline {
            font-family: 'JetBrains Mono', monospace;
            color: var(--cyan);
            font-size: 1rem;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        /* Container */
        .container {
            max-width: 1100px;
            margin: auto;
            padding: 80px 20px;
        }

        h2 {
            font-size: 2rem;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 40px;
            border-left: 5px solid var(--cyan);
            padding-left: 20px;
        }

        /* Team Profiles */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            margin-bottom: 80px;
        }

            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
        }
