    <style>
        :root {
            --navy: #0D1B2A;
            --dark-blue: #1B263B;
            --cyan: #00E5FF;
            --gold: #B89E6B;
            --white: #FFFFFF;
            --slate: #778899;
        }

        /* Base Reset */
        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--navy);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
            overflow-x: hidden; /* Prevents side-scrolling on mobile */
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 40px 20px; /* Reduced padding for mobile */
        }

        /* --- Header & Hero Section --- */
        header {
            text-align: center;
            padding: 40px 15px;
            background: rgba(13, 27, 42, 0.9);
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .hero-logo {
            width: 80px; 
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.4));
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1.8rem; /* Scaled down for mobile */
            font-weight: 900;
            letter-spacing: -1px;
            margin: 0 0 5px 0;
            color: var(--white);
            text-transform: uppercase;
        }
        
        .hero-subtitle {
            font-size: 1rem;
            color: var(--gold);
            font-weight: 700;
            margin: 0;
        }

        .status-terminal {
            font-family: 'JetBrains Mono', monospace;
            color: var(--cyan);
            font-size: 0.6rem;
            margin-top: 10px;
            letter-spacing: 1px;
            line-height: 1.4;
        }

        /* --- Global Typography --- */
        h2 {
            font-size: 1.5rem;
            color: var(--gold);
            text-transform: uppercase;
            border-left: 4px solid var(--cyan);
            padding-left: 15px;
            margin-bottom: 30px;
        }
        
        .section-intro {
            max-width: 100%;
            margin-bottom: 30px;
            text-align: left; /* Better for readability on small screens */
            font-size: 1rem;
            color: var(--slate);
        }

        /* --- Grid Layouts (Mobile First) --- */
        .values-grid, .team-grid, .pricing-grid, .service-list {
            display: grid;
            grid-template-columns: 1fr; /* Default to 1 column for mobile */
            gap: 20px;
        }

        /* --- Desktop Responsive Breakpoints --- */
        @media (min-width: 768px) {
            h1 { font-size: 2.5rem; }
            .values-grid { grid-template-columns: repeat(2, 1fr); }
            .team-grid { grid-template-columns: repeat(2, 1fr); }
            .pricing-grid { grid-template-columns: repeat(3, 1fr); }
            .service-list { grid-template-columns: repeat(2, 1fr); }
            .section-intro { text-align: center; }
        }

        @media (min-width: 1024px) {
            .values-grid { grid-template-columns: repeat(3, 1fr); }
            .service-list { grid-template-columns: repeat(3, 1fr); }
        }

        /* --- Cards & Components --- */
        .value-card, .profile-card, .pricing-card, .service-item, .case-study-card {
            background-color: var(--dark-blue);
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            height: 100%;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            margin-bottom: 15px;
        }

        /* --- Pricing Specifics --- */
        .price {
            font-size: 2rem;
            color: var(--cyan);
            font-weight: 900;
        }

        .pricing-card.highlight {
            border: 2px solid var(--cyan);
            transform: scale(1.02);
        }

        /* --- Founder's Alert --- */
        .beta-alert {
            background: rgba(184, 158, 107, 0.1);
            border: 1px dashed var(--gold);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            margin: 40px 0;
            font-size: 0.9rem;
        }

        /* --- CTA Section --- */
        .cta-section {
            text-align: center;
            padding: 60px 20px;
            background: var(--dark-blue);
        }

        .btn {
            background: var(--cyan);
            color: var(--navy);
            padding: 18px 30px;
            text-decoration: none;
            font-weight: 900;
            border-radius: 4px;
            text-transform: uppercase;
            display: block; /* Full width on mobile */
            width: 100%;
            max-width: 320px;
            margin: 10px auto;
            transition: all 0.3s ease;
        }

        @media (min-width: 768px) {
            .btn { display: inline-block; width: auto; }
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 30px 15px;
            font-size: 0.7rem;
            color: var(--slate);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
