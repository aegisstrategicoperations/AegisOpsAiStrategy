<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Ops & AI Strategy | Enterprise-Grade Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0D1B2A;
            --dark-blue: #1B263B;
            --cyan: #00E5FF;
            --gold: #B89E6B;
            --white: #FFFFFF;
            --slate: #778899;
        }

        body {
            background-color: var(--navy);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        /* Hero Header */
        header {
            text-align: center;
            padding: 100px 20px;
            background: radial-gradient(circle at center, #1B263B 0%, #0D1B2A 100%);
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
        }

        .hero-logo {
            width: 180px;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.4));
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin: 0;
            text-transform: uppercase;
        }

        .status-terminal {
            font-family: 'JetBrains Mono', monospace;
            color: var(--cyan);
            font-size: 0.8rem;
            margin-top: 15px;
            letter-spacing: 2px;
        }

        /* Main Container */
        .container {
            max-width: 1100px;
            margin: auto;
            padding: 80px 20px;
        }

        h2 {
            font-size: 1.8rem;
            color: var(--gold);
            text-transform: uppercase;
            border-left: 4px solid var(--cyan);
            padding-left: 20px;
            margin-bottom: 40px;
        }

        /* Team Section */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 80px;
        }

        .profile-card {
            background: var(--dark-blue);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
        }

        .profile-img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--gold);
            margin-bottom: 20px;
        }

        .profile-card h3 {
            color: var(--cyan);
            margin: 10px 0;
        }

        .title-tag {
            display: block;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 15px;
        }
